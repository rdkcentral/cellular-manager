# cellular-manager Configure Options
# This file contains autotools configure options for the cellular-manager component
# Each section can be edited independently for better maintainability

# ============================================================================
# NOTE: Pre-build setup commands are defined in component_config.json
# ============================================================================
# The following setup is performed automatically before build (see component_config.json):
#   - Creates libthreadutil.so linker script (redirects to libupnp)
#   - Creates placeholder dbus-1.0/include directory (workaround for Makefile.am syntax issue)

# ============================================================================
# CPPFLAGS - Preprocessor flags (includes and defines)
# ============================================================================
[CPPFLAGS]
# Autotools configuration
-DHAVE_CONFIG_H

# Include paths
-I$HOME/usr/include/rdkb/
-I/usr/include/dbus-1.0
-I/usr/lib/x86_64-linux-gnu/dbus-1.0/include
-I/usr/lib/x86_64-linux-gnu/glib-2.0/include
-I/usr/include/glib-2.0
-I/usr/include/libqmi-glib


# Standard defines
-DSC_POSIX_SEM
-DSET_REPLY_REQUIRED
-DIPV6=1
-U_ANSC_LITTLE_ENDIAN_

# Core system defines
-D_COSA_HAL_
-U_COSA_SIM_
-DCONFIG_SYSTEM_MOCA

# ANSC framework defines
-D_ANSC_LINUX
-D_ANSC_USER
-D_ANSC_LITTLE_ENDIAN_
-D_ANSC_USE_OPENSSL_
-D_ANSC_AES_USED_
-D_NO_ANSC_ZLIB_
-U_ANSC_IPV6_COMPATIBLE_

# CCSP/Component defines
-D_CCSP_CWMP_TCP_CONNREQ_HANDLER
-D_DSLH_STUN_
-D_NO_PKI_KB5_SUPPORT
-D_BBHM_SSE_FILE_IO
-DCCSP_SUPPORT_ENABLED

# Product/Platform defines
-D_COSA_INTEL_USG_ARM_
-D_COSA_FOR_COMCAST_
-D_COSA_BCM_ARM_
-DXBOOT_PLAT_PLATFORM_XLE
-D_SKY_HUB_COMMON_PRODUCT_REQ_
-D_WNXL11BWL_PRODUCT_REQ_
-DXBOOT_PLAT_BLDATA_UPDATE
-DXBOOT_PLAT_CERTTORE_UPDATE
-DXBOOT_PLAT_KEYSTORE_UPDATE

# Security and debugging
-DENABLE_SA_KEY
-D_NO_EXECINFO_H_
-D_DEBUG
-DINCLUDE_BREAKPAD

# System features
-DFEATURE_SUPPORT_RDKLOG
-DFEATURE_SUPPORT_SYSLOG
-DBUILD_WEB
-DUSE_NOTIFY_COMPONENT
-DNTPD_ENABLE
-DUTC_ENABLE
-DXDNS_ENABLE
-UNTPD_ENABLE
-DNAT46_KERNEL_SUPPORT
-DPIC

# MoCA specific
-DMOCA_HOME_ISOLATION

# Network features
-DENABLE_ETH_WAN
-DETH_4_PORTS
-D_BRIDGE_UTILS_BIN_
-DFEATURE_RDKB_WAN_MANAGER
-DWAN_MANAGER_UNIFICATION_ENABLED
-DWAN_FAILOVER_SUPPORTED
-DGATEWAY_FAILOVER_SUPPORTED
-DWAN_MANAGIn
-DSUPPORT_IPV6
-DUDHCPC_RUN_IN_BACKGROUND
-DUDHCPC_TX_RELEASE_ON_EXIT
-DRDK_SPEEDTEST_LTE
-DSKY
-DDHCPV4_CLIENT_UDHCPC
-DDHCPV6_CLIENT_DIBBLER
-DFEATURE_802_1P_COS_MARKING
-DFEATURE_FWUPGRADE_MANAGER
-DFEATURE_RDKB_CELLULAR_MANAGER
-DFEATURE_RDKB_LED_MANAGER
-DFEATURE_RDKB_NO_WPS_BUTTON
-DFEATURE_RDKB_THERMAL_MANAGER
-DFEATURE_SUPPORT_ECOPOWERDOWN
-DFEATURE_SUPPORT_WIFIDB
-DGPIO_LED_MGR

# WiFi features
-D_ENABLE_BAND_STEERING_
-D_BEACONRATE_SUPPORT
-D_WIFI_AX_SUPPORT_
-DWIFI_HAL_VERSION_3
-DFEATURE_SUPPORT_MESH
-DFEATURE_SUPPORT_WEBCONFIG
-DFEATURE_SUPPORT_PASSPOINT
-DFEATURE_CSI
-DFEATURE_SUPPORT_ONBOARD_LOGGING
-DRDK_ONEWIFI
-DCONFIG_DFS

# Mesh features
-DRDKB_EXTENDER
-DRDKB_EXTENDER_ENABLED
-DMESH_OVSAGENT_ENABLE

# Advanced features
-DFEATURE_RDKB_INTER_DEVICE_MANAGER

# Test/Development
-DCOLUMBO_HWTEST

# Build system
-DRBUS_BUILD_FLAG_ENABLE
-DBRCM_CMS_MSG
-DCHIP_FAMILY_ID_HEX=0x6855
-DRDKB_CELLULAR_SUPPORT

# ============================================================================
# CFLAGS - Compiler flags
# ============================================================================
[CFLAGS]

# Code generation flags
-fno-exceptions
-ffunction-sections
-fdata-sections
-fomit-frame-pointer
-fno-strict-aliasing
-Os
-fPIC
-feliminate-unused-debug-types
-g
-pipe

# ============================================================================
# LDFLAGS - Linker flags
# ============================================================================
[LDFLAGS]
# Library paths
-L$HOME/usr/local/lib
-L$HOME/usr/local/lib/x86_64-linux-gnu
-L/usr/lib/x86_64-linux-gnu
-Wl,-rpath,$HOME/usr/local/lib/x86_64-linux-gnu
-Wl,--allow-shlib-undefined
-Wl,--unresolved-symbols=ignore-all
-Wl,--no-as-needed
-Wl,--as-needed
-Wl,--hash-style=gnu
-Wl,-O1
-Wl,-soname
-Wl,-z

# ============================================================================
# LIBS - Libraries to link
# ============================================================================
[LIBS]
# External libraries
-lrbus
-lsecure_wrapper
-lrdkloggers
-ldbus-1
